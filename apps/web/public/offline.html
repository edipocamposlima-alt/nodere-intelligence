<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#03624C" />
    <title>NODERE offline</title>
    <style>
      :root {
        color-scheme: dark light;
        --bg: #081018;
        --panel: #101a26;
        --text: #f7fbff;
        --muted: #9fb2c7;
        --brand: #00df82;
        --brand-strong: #03624c;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f7fafc;
          --panel: #ffffff;
          --text: #07131f;
          --muted: #52657a;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(90deg, rgba(3, 98, 76, 0.12) 1px, transparent 1px),
          linear-gradient(0deg, rgba(3, 98, 76, 0.12) 1px, transparent 1px),
          var(--bg);
        background-size: 32px 32px;
        color: var(--text);
        font-family: Inter, Arial, sans-serif;
      }
      main {
        width: min(100%, 440px);
        border: 1px solid rgba(0, 223, 130, 0.24);
        border-radius: 20px;
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        padding: 28px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
      }
      .mark {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        margin-bottom: 18px;
        background: linear-gradient(135deg, #2a9d6a, #03624c);
        color: white;
        font-size: 30px;
        font-weight: 900;
        box-shadow: 0 0 24px rgba(0, 223, 130, 0.28);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }
      p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.55;
      }
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        background: var(--brand-strong);
        padding: 0 18px;
        color: white;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">N</div>
      <h1>NODERE offline</h1>
      <p>Sem conexão no momento. As telas já abertas podem continuar disponíveis, e a sincronização volta quando a internet retornar.</p>
      <a href="/dashboard">Tentar novamente</a>
    </main>
  </body>
</html>
