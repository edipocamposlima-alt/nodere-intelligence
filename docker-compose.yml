services:
  postgres:
    image: postgres:16-alpine
    container_name: nodere-postgres
    environment:
      POSTGRES_DB: nodere_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - nodere_pg_data:/var/lib/postgresql/data
      - ./packages/database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

volumes:
  nodere_pg_data:
