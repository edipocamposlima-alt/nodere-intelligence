services:
  # Servico oficial de API do NODERE atual.
  # Mantido como backend canonico em FONTE_OFICIAL_DO_PROJETO.txt e docs/PRODUCTION_REDEPLOY.md.
  - type: web
    name: nodere-api
    runtime: node
    rootDir: apps/api
    plan: free
    buildCommand: npm install --include=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEB_ORIGIN
        value: https://nodere.com.br
      - key: CORS_ORIGINS
        value: https://edipocamposlima-alt.github.io,https://nodere.com.br,https://www.nodere.com.br
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GOOGLE_PAGESPEED_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: admin@nodere.com.br
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MVP_OWNER_TOKEN
        sync: false
      - key: REQUIRE_OWNER_TOKEN
        value: "false"

  # LEGACY / A CONFIRMAR:
  # Este servico tambem aponta para apps/api, mas nao e tratado como backend canonico.
  # Nao remover automaticamente: confirmar no painel Render antes de desativar ou unificar.
  - type: web
    name: nodere-ts-api
    runtime: node
    rootDir: apps/api
    plan: free
    buildCommand: npm install --include=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEB_ORIGIN
        value: https://nodere.com.br
      - key: USE_MOCK_DATA
        value: false
      - key: API_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: admin@nodere.com.br
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      # Banco de dados - Supabase (preferir JS client)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Alternativa: conexao PostgreSQL direta (usar %23 no lugar de # na senha)
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GOOGLE_PAGESPEED_API_KEY
        sync: false
      - key: GOOGLE_BUSINESS_PROFILE_CLIENT_ID
        sync: false
      - key: GOOGLE_BUSINESS_PROFILE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_BUSINESS_PROFILE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_ADS_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_ADS_CUSTOMER_ID
        sync: false
      - key: GOOGLE_ADS_REFRESH_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WHATSAPP_CLOUD_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_AGENCY
        sync: false
      - key: STRIPE_SUCCESS_URL
        value: https://nodere.com.br/billing?success=1
      - key: STRIPE_CANCEL_URL
        value: https://nodere.com.br/billing?cancel=1
